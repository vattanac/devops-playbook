<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Playbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme Variables ── */
    :root[data-theme="dark"] {
      --bg-gradient-1: #020617;
      --bg-gradient-2: #0a1628;
      --bg-gradient-3: #0f172a;
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(56, 97, 168, 0.2);
      --glass-shadow: rgba(0, 0, 0, 0.4);
      --glass-hover: rgba(56, 97, 168, 0.12);
      --glass-active: rgba(59, 130, 246, 0.2);
      --glass-input: rgba(30, 58, 108, 0.3);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-dimmed: #475569;
      --text-faint: #334155;
      --scrollbar: rgba(59, 130, 246, 0.2);
      --scrollbar-hover: rgba(59, 130, 246, 0.35);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.35);
      --accent-hover: #2563eb;
      --accent-light: rgba(59, 130, 246, 0.12);
      --iframe-bg: #ffffff;
      --divider: rgba(56, 97, 168, 0.15);
      --badge-bg: rgba(59, 130, 246, 0.15);
      --badge-text: #60a5fa;
    }

    :root[data-theme="light"] {
      --bg-gradient-1: #e0e7ff;
      --bg-gradient-2: #c7d2fe;
      --bg-gradient-3: #ddd6fe;
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 255, 255, 0.7);
      --glass-shadow: rgba(99, 102, 241, 0.1);
      --glass-hover: rgba(99, 102, 241, 0.08);
      --glass-active: rgba(99, 102, 241, 0.15);
      --glass-input: rgba(255, 255, 255, 0.7);
      --text-primary: #1e1b4b;
      --text-secondary: #3730a3;
      --text-muted: #6366f1;
      --text-dimmed: #818cf8;
      --text-faint: #a5b4fc;
      --scrollbar: rgba(99, 102, 241, 0.2);
      --scrollbar-hover: rgba(99, 102, 241, 0.35);
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --accent-hover: #4f46e5;
      --accent-light: rgba(99, 102, 241, 0.1);
      --iframe-bg: #ffffff;
      --divider: rgba(99, 102, 241, 0.1);
      --badge-bg: rgba(99, 102, 241, 0.12);
      --badge-text: #6366f1;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
      color: var(--text-primary);
      transition: all 0.5s ease;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 50%, var(--accent-glow) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(56, 189, 248, 0.12) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
      animation: gradientShift 20s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    /* ── Glassmorphism Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid var(--glass-border);
      box-shadow: 4px 0 24px var(--glass-shadow);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      z-index: 10;
      position: relative;
      transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-primary);
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header h1 .title-icon {
      font-size: 18px;
    }

    .header-btn {
      background: var(--glass-input);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .header-btn:hover {
      color: var(--text-primary);
      background: var(--glass-hover);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      transform: translateY(-1px);
    }

    .theme-toggle {
      font-size: 15px !important;
    }

    .search-box {
      padding: 10px 16px;
      flex-shrink: 0;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      background: var(--glass-input);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .search-box input::placeholder { color: var(--text-dimmed); }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow), inset 0 0 8px var(--accent-light);
    }

    .tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }

    .tree-container::-webkit-scrollbar { width: 5px; }
    .tree-container::-webkit-scrollbar-track { background: transparent; }
    .tree-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }
    .tree-container::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    /* ── Tree Items ── */
    .tree-item {
      user-select: none;
    }

    .tree-label {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      padding-left: calc(14px + var(--depth, 0) * 18px);
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 10px;
      margin: 1px 0;
      transition: all 0.2s ease;
    }

    .tree-label:hover {
      background: var(--glass-hover);
      transform: translateX(2px);
    }

    .tree-label.active {
      background: var(--glass-active);
      border: 1px solid var(--accent);
      box-shadow: 0 0 12px var(--accent-glow), inset 0 0 8px var(--accent-light);
      color: var(--text-primary);
      font-weight: 500;
    }

    .tree-label:not(.active) {
      border: 1px solid transparent;
    }

    .tree-label .icon {
      flex-shrink: 0;
      width: 20px;
      text-align: center;
      margin-right: 8px;
      font-size: 15px;
    }

    .tree-label .chevron {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      font-size: 9px;
      transition: transform 0.2s ease;
      color: var(--text-dimmed);
    }

    .tree-label .chevron.open {
      transform: rotate(90deg);
    }

    .tree-label .name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-children {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .tree-children.open {
      max-height: 5000px;
    }

    .tree-label.hidden { display: none; }

    /* ── Resize Handle ── */
    .resize-handle {
      width: 6px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      position: relative;
      z-index: 11;
    }
    .resize-handle::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -5px;
      right: -5px;
    }
    .resize-handle:hover,
    .resize-handle.active {
      background: linear-gradient(180deg, var(--accent), rgba(14, 165, 233, 0.6));
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* ── Content Area ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .content-header {
      padding: 10px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      transition: all 0.5s;
    }

    .content-header .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .content-header .breadcrumb span {
      color: var(--text-dimmed);
      font-size: 12px;
    }

    .content-header .breadcrumb .current {
      color: var(--text-primary);
      font-weight: 500;
      background: var(--badge-bg);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .content-iframe {
      flex: 1;
      border: none;
      background: var(--iframe-bg);
      border-radius: 0;
    }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      gap: 20px;
      position: relative;
    }

    .welcome .logo {
      font-size: 72px;
      filter: drop-shadow(0 0 20px var(--accent-glow));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 420px;
      text-align: center;
      line-height: 1.7;
    }

    /* ── Buttons ── */
    .glass-btn {
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .glass-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .glass-btn-sm {
      padding: 5px 14px;
      background: var(--glass-input);
      backdrop-filter: blur(8px);
      color: var(--text-primary);
      text-decoration: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      margin-left: auto;
      transition: all 0.2s ease;
    }

    .glass-btn-sm:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* ── File type colors ── */
    .file-html .icon { color: #f97316; }
    .file-docx .icon, .file-doc .icon { color: #3b82f6; }
    .file-pdf .icon  { color: #ef4444; }
    .file-js .icon   { color: #eab308; }
    .file-py .icon   { color: #22d3ee; }
    .file-json .icon { color: #8b5cf6; }
    .file-md .icon   { color: #06b6d4; }
    .file-yaml .icon, .file-yml .icon { color: #f43f5e; }
    .file-sh .icon   { color: #22c55e; }
    .file-txt .icon  { color: var(--text-muted); }
    .folder .icon    { color: #fbbf24; }

    /* ── Sidebar Footer ── */
    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--divider);
      font-size: 11px;
      color: var(--text-dimmed);
      flex-shrink: 0;
      line-height: 1.7;
      transition: all 0.5s;
    }

    .sidebar-footer a {
      color: var(--badge-text);
      text-decoration: none;
      transition: all 0.2s;
    }

    .sidebar-footer a:hover {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
    }

    /* ── Text Viewer ── */
    .text-viewer {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13.5px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text-primary);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      tab-size: 4;
    }

    .text-viewer::-webkit-scrollbar { width: 6px; }
    .text-viewer::-webkit-scrollbar-track { background: transparent; }
    .text-viewer::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }
    .text-viewer::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    .text-viewer .line {
      display: flex;
      min-height: 24px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .text-viewer .line:hover {
      background: var(--glass-hover);
    }

    .text-viewer .line-num {
      width: 50px;
      flex-shrink: 0;
      text-align: right;
      padding-right: 16px;
      color: var(--text-dimmed);
      font-size: 12px;
      user-select: none;
      opacity: 0.6;
    }

    .text-viewer .line-content {
      flex: 1;
      padding-left: 16px;
      border-left: 1px solid var(--divider);
    }

    .text-viewer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--divider);
      font-size: 12px;
      color: var(--text-dimmed);
    }

    .text-viewer-header .file-badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
    }

    .text-viewer-header .line-count {
      margin-left: auto;
      color: var(--text-dimmed);
    }

    .copy-btn {
      background: var(--glass-input);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .copy-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .copy-btn.copied {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.4);
      color: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { width: 260px; min-width: 220px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="title-icon">📂</span> Explorer</h1>
      <button class="header-btn theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">🌙</button>
      <button class="header-btn" onclick="loadTree()" title="Refresh tree">⟳</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search files..." oninput="filterTree(this.value)">
    </div>
    <div class="tree-container" id="treeContainer"></div>
    <div class="sidebar-footer">
      &copy; 2026 Sim Vattanac<br>
      <a href="mailto:vattanacsim99@gmail.com">vattanacsim99@gmail.com</a>
    </div>
  </nav>

  <!-- Resize Handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Content -->
  <main class="content" id="content">
    <div class="welcome" id="welcome">
      <div class="logo">📖</div>
      <h2>DevOps Playbook</h2>
      <p>Select a file from the sidebar to view its contents. Folders can be expanded by clicking on them.</p>
    </div>
  </main>

  <script>
    // ── State ──
    let activeLabel = null;

    // ── Theme Toggle ──
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
      try { localStorage.setItem('theme', next); } catch(e) {}
    }

    // Load saved theme
    (function() {
      try {
        const saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
          document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
        }
      } catch(e) {}
    })();

    // ── File Icons ──
    const FILE_ICONS = {
      '.html': '🌐',
      '.htm':  '🌐',
      '.docx': '📄',
      '.doc':  '📄',
      '.pdf':  '📕',
      '.js':   '📜',
      '.ts':   '📜',
      '.py':   '🐍',
      '.json': '{}',
      '.md':   '📝',
      '.yaml': '⚙️',
      '.yml':  '⚙️',
      '.sh':   '🔧',
      '.txt':  '📃',
      '.png':  '🖼️',
      '.jpg':  '🖼️',
      '.jpeg': '🖼️',
      '.gif':  '🖼️',
      '.svg':  '🖼️',
      '.css':  '🎨',
      '.xml':  '📋',
    };

    const FOLDER_ICON_CLOSED = '📁';
    const FOLDER_ICON_OPEN   = '📂';

    function getFileIcon(name) {
      const ext = '.' + name.split('.').pop().toLowerCase();
      return FILE_ICONS[ext] || '📄';
    }

    function getFileClass(name) {
      const ext = name.split('.').pop().toLowerCase();
      return 'file-' + ext;
    }

    // ── HTML Escape ──
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Format Display Name ──
    function formatDisplayName(name, type) {
      let display = name;
      if (type === 'file') {
        display = display.replace(/\.(html|htm)$/i, '');
      }
      display = display.replace(/-/g, ' ').trim();
      display = display.replace(/\b\w/g, c => c.toUpperCase());
      return display;
    }

    // ── Build Tree DOM ──
    function buildTree(items, container, depth = 0) {
      items.forEach(item => {
        const treeItem = document.createElement('div');
        treeItem.className = 'tree-item';

        const label = document.createElement('div');
        label.className = 'tree-label' + (item.type === 'file' ? ' ' + getFileClass(item.name) : ' folder');
        label.style.setProperty('--depth', depth);
        label.dataset.name = item.name.toLowerCase();
        label.dataset.path = item.path;

        if (item.type === 'folder') {
          const chevron = document.createElement('span');
          chevron.className = 'chevron';
          chevron.textContent = '▶';
          label.appendChild(chevron);

          const icon = document.createElement('span');
          icon.className = 'icon';
          icon.textContent = FOLDER_ICON_CLOSED;
          label.appendChild(icon);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = formatDisplayName(item.name, 'folder');
          label.appendChild(nameSpan);

          const childrenDiv = document.createElement('div');
          childrenDiv.className = 'tree-children';

          label.addEventListener('click', () => {
            const isOpen = childrenDiv.classList.toggle('open');
            chevron.classList.toggle('open', isOpen);
            icon.textContent = isOpen ? FOLDER_ICON_OPEN : FOLDER_ICON_CLOSED;
          });

          treeItem.appendChild(label);
          treeItem.appendChild(childrenDiv);

          if (item.children && item.children.length > 0) {
            buildTree(item.children, childrenDiv, depth + 1);
          }
        } else {
          const spacer = document.createElement('span');
          spacer.className = 'chevron';
          spacer.textContent = '';
          label.appendChild(spacer);

          const icon = document.createElement('span');
          icon.className = 'icon';
          icon.textContent = getFileIcon(item.name);
          label.appendChild(icon);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = formatDisplayName(item.name, 'file');
          label.appendChild(nameSpan);

          label.addEventListener('click', () => {
            openFile(item.path, item.name);
            if (activeLabel) activeLabel.classList.remove('active');
            label.classList.add('active');
            activeLabel = label;
          });

          treeItem.appendChild(label);
        }

        container.appendChild(treeItem);
      });
    }

    // ── Open File in Content Area ──
    function openFile(path, name) {
      const content = document.getElementById('content');
      const ext = name.split('.').pop().toLowerCase();

      const parts = path.split('/');
      let breadcrumbHTML = '<div class="breadcrumb">';
      parts.forEach((part, i) => {
        if (i > 0) breadcrumbHTML += '<span>›</span>';
        if (i === parts.length - 1) {
          breadcrumbHTML += `<span class="current">${part}</span>`;
        } else {
          breadcrumbHTML += `<span>${part}</span>`;
        }
      });
      breadcrumbHTML += '</div>';

      const iframeViewable = ['html', 'htm', 'pdf', 'png', 'jpg', 'jpeg', 'gif', 'svg'];
      const textViewable = ['txt', 'json', 'js', 'css', 'xml', 'md', 'yaml', 'yml', 'py', 'sh', 'ts', 'toml', 'cfg', 'ini', 'log', 'env', 'csv'];
      const officeExtensions = ['docx', 'doc', 'xlsx', 'xls', 'pptx', 'ppt'];

      if (iframeViewable.includes(ext)) {
        content.innerHTML = `
          <div class="content-header">${breadcrumbHTML}</div>
          <iframe class="content-iframe" src="${encodeURI(path)}"></iframe>
        `;
      } else if (textViewable.includes(ext)) {
        content.innerHTML = `
          <div class="content-header">
            ${breadcrumbHTML}
            <a href="${encodeURI(path)}" download class="glass-btn-sm">⬇ Download</a>
          </div>
          <div class="text-viewer-header">
            <span class="file-badge">${ext}</span>
            <button class="copy-btn" id="copyBtn" onclick="copyFileContent()">📋 Copy</button>
            <span class="line-count">Loading...</span>
          </div>
          <div class="text-viewer" id="textViewer">Loading file...</div>
        `;
        fetch(encodeURI(path) + '?t=' + Date.now())
          .then(r => r.text())
          .then(text => {
            const viewer = document.getElementById('textViewer');
            viewer.dataset.rawText = text;
            const lines = text.split('\n');
            const lineCountEl = content.querySelector('.line-count');
            if (lineCountEl) lineCountEl.textContent = lines.length + ' lines';
            viewer.innerHTML = lines.map((line, i) =>
              `<div class="line"><span class="line-num">${i + 1}</span><span class="line-content">${escapeHtml(line) || ' '}</span></div>`
            ).join('');
          })
          .catch(err => {
            document.getElementById('textViewer').textContent = 'Error loading file: ' + err.message;
          });
      } else if (officeExtensions.includes(ext)) {
        const fileURL = encodeURIComponent(window.location.origin + '/' + path);
        const viewerURL = 'https://view.officeapps.live.com/op/embed.aspx?src=' + fileURL;
        content.innerHTML = `
          <div class="content-header">
            ${breadcrumbHTML}
            <a href="${encodeURI(path)}" download class="glass-btn-sm">⬇ Download</a>
          </div>
          <iframe class="content-iframe" src="${viewerURL}"></iframe>
        `;
      } else {
        content.innerHTML = `
          <div class="content-header">${breadcrumbHTML}</div>
          <div class="welcome">
            <div class="logo">${getFileIcon(name)}</div>
            <h2>${name}</h2>
            <p>This file type cannot be previewed in the browser.<br>Click below to download it.</p>
            <a href="${encodeURI(path)}" download class="glass-btn">⬇ Download File</a>
          </div>
        `;
      }
    }

    // ── Search / Filter ──
    function filterTree(query) {
      const q = query.toLowerCase().trim();
      const allLabels = document.querySelectorAll('.tree-label');

      if (!q) {
        allLabels.forEach(label => label.classList.remove('hidden'));
        return;
      }

      allLabels.forEach(label => label.classList.add('hidden'));

      allLabels.forEach(label => {
        if (label.dataset.name && label.dataset.name.includes(q)) {
          label.classList.remove('hidden');
          let parent = label.parentElement;
          while (parent && parent !== document.getElementById('treeContainer')) {
            if (parent.classList.contains('tree-children')) {
              parent.classList.add('open');
              const folderLabel = parent.previousElementSibling;
              if (folderLabel && folderLabel.classList.contains('tree-label')) {
                folderLabel.classList.remove('hidden');
                const chevron = folderLabel.querySelector('.chevron');
                if (chevron) chevron.classList.add('open');
                const icon = folderLabel.querySelector('.icon');
                if (icon && folderLabel.classList.contains('folder')) {
                  icon.textContent = FOLDER_ICON_OPEN;
                }
              }
            }
            parent = parent.parentElement;
          }
        }
      });
    }

    // ── Load Tree from JSON ──
    async function loadTree() {
      const container = document.getElementById('treeContainer');
      container.innerHTML = '';

      try {
        const response = await fetch('folder_structure.json?t=' + Date.now());
        if (!response.ok) throw new Error('Could not load folder_structure.json');
        const data = await response.json();
        buildTree(data, container);
      } catch (err) {
        container.innerHTML = `
          <div style="padding: 20px; color: #f97316; font-size: 13px;">
            ⚠️ Could not load folder structure.<br><br>
            Run <code style="background: var(--glass-input); padding:3px 8px; border-radius:6px;">python3 build_menu.py</code> to generate it.
          </div>
        `;
        console.error(err);
      }
    }

    // ── Sidebar Resize ──
    (function() {
      const handle = document.getElementById('resizeHandle');
      const sidebar = document.getElementById('sidebar');
      const contentEl = document.getElementById('content');
      let isResizing = false;

      handle.addEventListener('mousedown', (e) => {
        isResizing = true;
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        const iframes = contentEl.querySelectorAll('iframe');
        iframes.forEach(f => f.style.pointerEvents = 'none');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        requestAnimationFrame(() => {
          const newWidth = Math.max(200, Math.min(e.clientX, 500));
          sidebar.style.width = newWidth + 'px';
          sidebar.style.minWidth = newWidth + 'px';
        });
      });

      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          const iframes = contentEl.querySelectorAll('iframe');
          iframes.forEach(f => f.style.pointerEvents = '');
        }
      });
    })();

    // ── Copy File Content ──
    function copyFileContent() {
      const viewer = document.getElementById('textViewer');
      const btn = document.getElementById('copyBtn');
      const text = viewer.dataset.rawText || viewer.textContent;

      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '✓ Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '📋 Copy';
        }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        btn.classList.add('copied');
        btn.innerHTML = '✓ Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '📋 Copy';
        }, 2000);
      });
    }

    // ── Init ──
    loadTree();
  </script>
</body>
</html>
