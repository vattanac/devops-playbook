<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Playbook</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme Variables ── */
    :root[data-theme="dark"] {
      --bg-primary: #1e1e1e;
      --bg-sidebar: #252526;
      --bg-input: #3c3c3c;
      --bg-hover: #2a2d2e;
      --bg-active: #094771;
      --border: #3c3c3c;
      --text-primary: #cccccc;
      --text-secondary: #bbbbbb;
      --text-muted: #888888;
      --text-dimmed: #777777;
      --text-faint: #555555;
      --text-heading: #666666;
      --scrollbar: #555555;
      --scrollbar-hover: #666666;
      --accent: #007acc;
      --accent-hover: #005fa3;
      --iframe-bg: #ffffff;
    }

    :root[data-theme="light"] {
      --bg-primary: #f5f5f5;
      --bg-sidebar: #ffffff;
      --bg-input: #e8e8e8;
      --bg-hover: #e9e9e9;
      --bg-active: #d0e8ff;
      --border: #d4d4d4;
      --text-primary: #333333;
      --text-secondary: #444444;
      --text-muted: #666666;
      --text-dimmed: #888888;
      --text-faint: #999999;
      --text-heading: #555555;
      --scrollbar: #c0c0c0;
      --scrollbar-hover: #a0a0a0;
      --accent: #0078d4;
      --accent-hover: #005a9e;
      --iframe-bg: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      transition: border-color 0.3s;
    }

    .sidebar-header h1 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      flex: 1;
      transition: color 0.3s;
    }

    .sidebar-header .header-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .sidebar-header .header-btn:hover {
      color: var(--text-primary);
      background: var(--bg-input);
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      font-size: 16px !important;
    }

    .search-box {
      padding: 8px 12px;
      flex-shrink: 0;
    }

    .search-box input {
      width: 100%;
      padding: 6px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, background 0.3s, color 0.3s;
    }

    .search-box input::placeholder { color: var(--text-dimmed); }
    .search-box input:focus { border-color: var(--accent); }

    .tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .tree-container::-webkit-scrollbar { width: 6px; }
    .tree-container::-webkit-scrollbar-track { background: transparent; }
    .tree-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    .tree-container::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    /* ── Tree Items ── */
    .tree-item {
      user-select: none;
    }

    .tree-label {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      padding-left: calc(16px + var(--depth, 0) * 18px);
      cursor: pointer;
      transition: background 0.1s;
      font-size: 13px;
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 0;
    }

    .tree-label:hover {
      background: var(--bg-hover);
    }

    .tree-label.active {
      background: var(--bg-active);
      color: var(--text-primary);
    }

    [data-theme="dark"] .tree-label.active {
      color: #ffffff;
    }

    .tree-label .icon {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
      margin-right: 6px;
      font-size: 14px;
    }

    .tree-label .chevron {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      font-size: 10px;
      transition: transform 0.15s;
      color: var(--text-muted);
    }

    .tree-label .chevron.open {
      transform: rotate(90deg);
    }

    .tree-label .name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-children {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }

    .tree-children.open {
      max-height: 5000px;
    }

    .tree-label.hidden { display: none; }

    /* ── Resize Handle ── */
    .resize-handle {
      width: 6px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      position: relative;
    }
    .resize-handle::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -4px;
      right: -4px;
    }
    .resize-handle:hover,
    .resize-handle.active {
      background: var(--accent);
    }

    /* ── Content Area ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      overflow: hidden;
      transition: background 0.3s;
    }

    .content-header {
      padding: 8px 16px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .content-header .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .content-header .breadcrumb span {
      color: var(--text-muted);
    }

    .content-header .breadcrumb .current {
      color: var(--text-primary);
    }

    .content-iframe {
      flex: 1;
      border: none;
      background: var(--iframe-bg);
    }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      gap: 16px;
    }

    .welcome .logo {
      font-size: 64px;
      opacity: 0.3;
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 400;
      color: var(--text-heading);
    }

    .welcome p {
      font-size: 13px;
      color: var(--text-faint);
      max-width: 400px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── File type colors ── */
    .file-html .icon { color: #e44d26; }
    .file-docx .icon, .file-doc .icon { color: #2b579a; }
    .file-pdf .icon  { color: #e44d26; }
    .file-js .icon   { color: #f7df1e; }
    .file-py .icon   { color: #3572a5; }
    .file-json .icon { color: #5b9bd5; }
    .file-md .icon   { color: #519aba; }
    .file-yaml .icon, .file-yml .icon { color: #cb171e; }
    .file-sh .icon   { color: #89e051; }
    .file-txt .icon  { color: var(--text-muted); }
    .folder .icon    { color: #dcb67a; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { width: 240px; min-width: 200px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>📂 Explorer</h1>
      <button class="header-btn theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">🌙</button>
      <button class="header-btn" onclick="loadTree()" title="Refresh tree">⟳</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search files..." oninput="filterTree(this.value)">
    </div>
    <div class="tree-container" id="treeContainer"></div>
  </nav>

  <!-- Resize Handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Content -->
  <main class="content" id="content">
    <div class="welcome" id="welcome">
      <div class="logo">📖</div>
      <h2>DevOps Playbook</h2>
      <p>Select a file from the sidebar to view its contents. Folders can be expanded by clicking on them.</p>
    </div>
  </main>

  <script>
    // ── State ──
    let activeLabel = null;

    // ── Theme Toggle ──
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
      try { localStorage.setItem('theme', next); } catch(e) {}
    }

    // Load saved theme
    (function() {
      try {
        const saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
          document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
        }
      } catch(e) {}
    })();

    // ── File Icons ──
    const FILE_ICONS = {
      '.html': '🌐',
      '.htm':  '🌐',
      '.docx': '📄',
      '.doc':  '📄',
      '.pdf':  '📕',
      '.js':   '📜',
      '.ts':   '📜',
      '.py':   '🐍',
      '.json': '{}',
      '.md':   '📝',
      '.yaml': '⚙️',
      '.yml':  '⚙️',
      '.sh':   '🔧',
      '.txt':  '📃',
      '.png':  '🖼️',
      '.jpg':  '🖼️',
      '.jpeg': '🖼️',
      '.gif':  '🖼️',
      '.svg':  '🖼️',
      '.css':  '🎨',
      '.xml':  '📋',
    };

    const FOLDER_ICON_CLOSED = '📁';
    const FOLDER_ICON_OPEN   = '📂';

    function getFileIcon(name) {
      const ext = '.' + name.split('.').pop().toLowerCase();
      return FILE_ICONS[ext] || '📄';
    }

    function getFileClass(name) {
      const ext = name.split('.').pop().toLowerCase();
      return 'file-' + ext;
    }

    // ── Format Display Name ──
    // Removes .html extension, replaces "-" with spaces, capitalizes each word
    function formatDisplayName(name, type) {
      let display = name;
      // Remove .html/.htm extension for files
      if (type === 'file') {
        display = display.replace(/\.(html|htm)$/i, '');
      }
      // Replace hyphens with spaces
      display = display.replace(/-/g, ' ').trim();
      // Capitalize each word
      display = display.replace(/\b\w/g, c => c.toUpperCase());
      return display;
    }

    // ── Build Tree DOM ──
    function buildTree(items, container, depth = 0) {
      items.forEach(item => {
        const treeItem = document.createElement('div');
        treeItem.className = 'tree-item';

        const label = document.createElement('div');
        label.className = 'tree-label' + (item.type === 'file' ? ' ' + getFileClass(item.name) : ' folder');
        label.style.setProperty('--depth', depth);
        label.dataset.name = item.name.toLowerCase();
        label.dataset.path = item.path;

        if (item.type === 'folder') {
          const chevron = document.createElement('span');
          chevron.className = 'chevron';
          chevron.textContent = '▶';
          label.appendChild(chevron);

          const icon = document.createElement('span');
          icon.className = 'icon';
          icon.textContent = FOLDER_ICON_CLOSED;
          label.appendChild(icon);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = formatDisplayName(item.name, 'folder');
          label.appendChild(nameSpan);

          const childrenDiv = document.createElement('div');
          childrenDiv.className = 'tree-children';

          label.addEventListener('click', () => {
            const isOpen = childrenDiv.classList.toggle('open');
            chevron.classList.toggle('open', isOpen);
            icon.textContent = isOpen ? FOLDER_ICON_OPEN : FOLDER_ICON_CLOSED;
          });

          treeItem.appendChild(label);
          treeItem.appendChild(childrenDiv);

          if (item.children && item.children.length > 0) {
            buildTree(item.children, childrenDiv, depth + 1);
          }
        } else {
          // Spacer for alignment with folders
          const spacer = document.createElement('span');
          spacer.className = 'chevron';
          spacer.textContent = '';
          label.appendChild(spacer);

          const icon = document.createElement('span');
          icon.className = 'icon';
          icon.textContent = getFileIcon(item.name);
          label.appendChild(icon);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = formatDisplayName(item.name, 'file');
          label.appendChild(nameSpan);

          label.addEventListener('click', () => {
            openFile(item.path, item.name);
            if (activeLabel) activeLabel.classList.remove('active');
            label.classList.add('active');
            activeLabel = label;
          });

          treeItem.appendChild(label);
        }

        container.appendChild(treeItem);
      });
    }

    // ── Open File in Content Area ──
    function openFile(path, name) {
      const content = document.getElementById('content');
      const ext = name.split('.').pop().toLowerCase();

      // Build breadcrumb
      const parts = path.split('/');
      let breadcrumbHTML = '<div class="breadcrumb">';
      parts.forEach((part, i) => {
        if (i > 0) breadcrumbHTML += '<span>›</span>';
        if (i === parts.length - 1) {
          breadcrumbHTML += `<span class="current">${part}</span>`;
        } else {
          breadcrumbHTML += `<span>${part}</span>`;
        }
      });
      breadcrumbHTML += '</div>';

      // Viewable in iframe
      const viewableExtensions = ['html', 'htm', 'pdf', 'png', 'jpg', 'jpeg', 'gif', 'svg', 'txt', 'json', 'js', 'css', 'xml', 'md'];

      // Office files viewable via Microsoft Office Online viewer
      const officeExtensions = ['docx', 'doc', 'xlsx', 'xls', 'pptx', 'ppt'];

      if (viewableExtensions.includes(ext)) {
        content.innerHTML = `
          <div class="content-header">${breadcrumbHTML}</div>
          <iframe class="content-iframe" src="${encodeURI(path)}"></iframe>
        `;
      } else if (officeExtensions.includes(ext)) {
        // Use Microsoft Office Online viewer to preview Office files
        const fileURL = encodeURIComponent(window.location.origin + '/' + path);
        const viewerURL = 'https://view.officeapps.live.com/op/embed.aspx?src=' + fileURL;
        content.innerHTML = `
          <div class="content-header">
            ${breadcrumbHTML}
            <a href="${encodeURI(path)}" download style="
              margin-left: auto;
              padding: 4px 12px;
              background: var(--accent);
              color: #fff;
              text-decoration: none;
              border-radius: 4px;
              font-size: 12px;
              transition: background 0.15s;
            " onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">
              ⬇ Download
            </a>
          </div>
          <iframe class="content-iframe" src="${viewerURL}"></iframe>
        `;
      } else {
        // For other non-viewable files, show a download prompt
        content.innerHTML = `
          <div class="content-header">${breadcrumbHTML}</div>
          <div class="welcome">
            <div class="logo">${getFileIcon(name)}</div>
            <h2>${name}</h2>
            <p>This file type cannot be previewed in the browser.<br>Click below to download it.</p>
            <a href="${encodeURI(path)}" download style="
              margin-top: 12px;
              padding: 10px 24px;
              background: var(--accent);
              color: #fff;
              text-decoration: none;
              border-radius: 6px;
              font-size: 14px;
              transition: background 0.15s;
            " onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">
              ⬇ Download File
            </a>
          </div>
        `;
      }
    }

    // ── Search / Filter ──
    function filterTree(query) {
      const q = query.toLowerCase().trim();
      const allLabels = document.querySelectorAll('.tree-label');

      if (!q) {
        allLabels.forEach(label => label.classList.remove('hidden'));
        return;
      }

      // First hide all, then show matches and their parent folders
      allLabels.forEach(label => label.classList.add('hidden'));

      allLabels.forEach(label => {
        if (label.dataset.name && label.dataset.name.includes(q)) {
          label.classList.remove('hidden');
          // Expand and show parent folders
          let parent = label.parentElement;
          while (parent && parent !== document.getElementById('treeContainer')) {
            if (parent.classList.contains('tree-children')) {
              parent.classList.add('open');
              // Show the folder's label
              const folderLabel = parent.previousElementSibling;
              if (folderLabel && folderLabel.classList.contains('tree-label')) {
                folderLabel.classList.remove('hidden');
                const chevron = folderLabel.querySelector('.chevron');
                if (chevron) chevron.classList.add('open');
                const icon = folderLabel.querySelector('.icon');
                if (icon && folderLabel.classList.contains('folder')) {
                  icon.textContent = FOLDER_ICON_OPEN;
                }
              }
            }
            parent = parent.parentElement;
          }
        }
      });
    }

    // ── Load Tree from JSON ──
    async function loadTree() {
      const container = document.getElementById('treeContainer');
      container.innerHTML = '';

      try {
        const response = await fetch('folder_structure.json?t=' + Date.now());
        if (!response.ok) throw new Error('Could not load folder_structure.json');
        const data = await response.json();
        buildTree(data, container);
      } catch (err) {
        container.innerHTML = `
          <div style="padding: 20px; color: #e44d26; font-size: 13px;">
            ⚠️ Could not load folder structure.<br><br>
            Run <code style="background: var(--bg-input); padding:2px 6px; border-radius:3px;">python3 build_menu.py</code> to generate it.
          </div>
        `;
        console.error(err);
      }
    }

    // ── Sidebar Resize ──
    (function() {
      const handle = document.getElementById('resizeHandle');
      const sidebar = document.getElementById('sidebar');
      const contentEl = document.getElementById('content');
      let isResizing = false;

      handle.addEventListener('mousedown', (e) => {
        isResizing = true;
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        // Prevent iframe from stealing mouse events
        const iframes = contentEl.querySelectorAll('iframe');
        iframes.forEach(f => f.style.pointerEvents = 'none');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        requestAnimationFrame(() => {
          const newWidth = Math.max(180, Math.min(e.clientX, 500));
          sidebar.style.width = newWidth + 'px';
          sidebar.style.minWidth = newWidth + 'px';
        });
      });

      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          const iframes = contentEl.querySelectorAll('iframe');
          iframes.forEach(f => f.style.pointerEvents = '');
        }
      });
    })();

    // ── Init ──
    loadTree();
  </script>
</body>
</html>
